<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact</title>
     <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="project.html">Projects</a>
            <a href="blog.html">Blog</a>
            <a href="contact.html">Contact</a>
        </nav>

    </header>

    <main>

        <h1>Reach Me</h1>

        <form>

            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your name">
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email">
            <br><br>

            <label for="subject">Subject:</label>

            <select id="subject">
                <option>Questions</option>
                <option>Project Development</option>
                <option>Feedback</option>
            </select>

            <br><br>

            <h2>My Contact Details</h2>

            <p>Email: gaterudemichira@gmail.com</p>
            <p>Phone: +254 768821138</p>

            <label>Preferred Contact Method:</label>
            <br>

            <input type="radio" id="email-contact" name="contact">
            <label for="email-contact">Email</label>

            <input type="radio" id="phone-contact" name="contact">
            <label for="phone-contact">Phone</label>

            <br><br>

            <label for="message">Message:</label>
            <br>

            <textarea id="message"
                      rows="5"
                      cols="30"
                      placeholder="Write your message here">
            </textarea>

            <br><br>

            <button type="submit">Send</button>

        </form>

        <section>

            <h2>FAQ</h2>

            <details>
                <summary>How can you be contacted?</summary>

                <p>
                    My contact information is provided above,
                    including email and phone number.
                </p>
            </details>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Gartrude Michira</p>
    </footer>

</body>
</html>
